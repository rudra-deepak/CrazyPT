<div style="display:flex;gap:12px;">

    <button
        type="button"

        style="
            flex:1;

            border:none;

            background:#6D28D9;
            color:white;
            font-size:17px;
            font-weight:600;

            box-shadow:0 10px 25px rgba(124,58,237,.4);
        ">
        📩 Send OTP
    </button>

    <button
        id="signupBtn"
        type="submit"
        disabled
        style="
            flex:1;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#555;
            color:white;
            font-size:17px;
            font-weight:600;
            cursor:not-allowed;
        ">
        🚀 Sign Up
    </button>

</div>

</form>

            <span style="color:#d1d5db;">
                Already have an account?
            </span>

            <a href="{{ url_for('login') }}" style="
                color:#c084fc;
                text-decoration:none;

            </a>

<script>
function sendOTP() {

    const email = document.querySelector('input[name="email"]').value;

    if(email === ""){
        alert("Please enter your email first.");
        return;
    }

    fetch("/send_otp",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            email:email
        })
    })
    .then(res=>res.json())
    .then(data=>{

        alert(data.message);

        const btn=document.getElementById("signupBtn");

        btn.disabled=false;
        btn.style.background="linear-gradient(135deg,#7C3AED,#9333EA)";
        btn.style.cursor="pointer";

    });

}
</script>
<script src="/static/js/theme.js"></script>
