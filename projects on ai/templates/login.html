<!DOCTYPE html>
<html>

<head>
    <style>
        body{
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>


    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.jpeg') }}">

    <title>Login</title>

    <!-- <link rel="stylesheet" href="/static/css/style.css"> -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="stylesheet" href="/static/css/animations.css">

</head>
<div style="
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
    padding:0;
    margin-top: 40px;
">

    <img src="{{ url_for('static', filename='favicon.jpeg') }}"
         alt="CrazyPT Logo"
         style="
            width:150px;
            height:150px;
            border-radius:50%;
         ">

</div>
<body>

<div style="
    min-height:50vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
">

    <div style="
        width:100%;
        max-width:450px;
        background:rgba(255,255,255,.08);
        backdrop-filter:blur(18px);
        border:1px solid rgba(255,255,255,.15);
        border-radius:25px;
        padding:45px;
        box-shadow:0 20px 45px rgba(0,0,0,.35);
        text-align:center;
    ">

        <h1 style="
            font-size:55px;
            margin-bottom:10px;
            color:#c084fc;
        ">
            🔐 Login
        </h1>

        <p style="
            color:#d1d5db;
            margin-bottom:35px;
            font-size:17px;
        ">
            Welcome back! Sign in to continue using
            <span style="color:#c084fc;font-weight:700;">CrazyPT</span>
        </p>

        <form action="/login" method="POST">

            <input
                type="email"
                name="email"
                placeholder="📧 Email Address"
                required

                style="
                width:100%;
                padding:16px;
                margin-bottom:18px;
                border:none;
                outline:none;
                border-radius:14px;
                background:rgba(255,255,255,.12);
                color:white;
                font-size:16px;
                box-sizing:border-box;
            ">

            <input
                type="password"
                name="password"
                placeholder="🔒 Password"
                required

                style="
                width:100%;
                padding:16px;
                margin-bottom:25px;
                border:none;
                outline:none;
                border-radius:14px;
                background:rgba(255,255,255,.12);
                color:white;
                font-size:16px;
                box-sizing:border-box;
            ">

            <button
                type="submit"

                style="
                width:100%;
                padding:16px;
                border:none;
                border-radius:14px;
                background:linear-gradient(135deg,#7C3AED,#9333EA);
                color:white;
                font-size:18px;
                font-weight:600;
                cursor:pointer;
                box-shadow:0 10px 25px rgba(124,58,237,.4);
                transition:.3s;
            ">
                🚀 Sign In
            </button>

        </form>

        <div style="margin-top:25px;">

            <span style="color:#d1d5db;">
                Don't have an account?
            </span>

            <a href="{{ url_for('signup') }}" style="
                color:#c084fc;
                text-decoration:none;
                font-weight:700;
            ">
                Sign Up
            </a>

        </div>

    </div>

</div>
<script src="/static/js/theme.js"></script>

</body>
</html>
